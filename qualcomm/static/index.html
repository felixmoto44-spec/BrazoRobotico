<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BrazoRobótico — UNO Q</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --green:#00e676; }
  body { font-family:'Inter',system-ui,sans-serif; background:radial-gradient(ellipse at 50% 0%,#0b1a2e 0%,#060b14 60%,#030610 100%); color:#c8d6e5; min-height:100vh; display:flex; flex-direction:column; align-items:center; font-size:14px; }
  .container { max-width:480px; width:100%; padding:4px; display:flex; flex-direction:column; gap:4px; }

  header { text-align:center; padding:6px 0 0; }
  header h1 { font-size:1.1em; font-weight:700; background:linear-gradient(135deg,var(--green),#00c853,#69f0ae); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  header .sub { font-size:0.6em; color:#455a64; letter-spacing:2px; text-transform:uppercase; }

  .status-bar { display:flex; align-items:center; justify-content:center; gap:6px; font-size:0.7em; padding:2px 0; }
  .dot { width:7px; height:7px; border-radius:50%; background:#ff5252; }
  .dot.on { background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 4px rgba(0,230,118,0.3);} 50%{box-shadow:0 0 14px rgba(0,230,118,0.7);} }
  .latency { color:#546e7a; font-size:0.85em; }
  .latency.good { color:var(--green); }
  .latency.warn { color:#ffab00; }
  .latency.bad { color:#ff5252; }

  .card { background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.05); border-radius:10px; }

  .video-wrap { position:relative; width:100%; aspect-ratio:4/3; background:#000; overflow:hidden; border-radius:10px 10px 0 0; }
  .three-wrap { width:100%; aspect-ratio:2/1; background:#060b14; overflow:hidden; }
  .video-wrap video, .video-wrap canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  .video-wrap video { z-index:1; display:block; }
  .video-wrap canvas { z-index:2; pointer-events:none; }

  .three-wrap canvas { display:block; width:100%; height:100%; }

  .btn-row { display:flex; gap:4px; padding:6px; flex-wrap:wrap; justify-content:center; }
  button { padding:8px 14px; border-radius:8px; font-size:0.75em; font-weight:600; cursor:pointer; transition:all 0.25s; font-family:inherit; background:transparent; color:#ffab00; border:1px solid rgba(255,171,0,0.2); flex:0 1 auto; }
  .b-on { background:linear-gradient(135deg,#00c853,var(--green)); color:#000; border:none; }
  .b-on:hover { box-shadow:0 3px 16px rgba(0,230,118,0.4); }
  .b-on:disabled { background:#0f1f0f; color:#2a4a2a; cursor:not-allowed; box-shadow:none; }
  .b-off { color:#ff5252; border-color:rgba(255,82,82,0.2); }
  .b-off:disabled { opacity:0.3; cursor:not-allowed; }
  .b-rec.recording { background:rgba(255,23,68,0.2); color:#ff1744; border-color:#ff1744; animation:pulse-rec 1s infinite; }
  @keyframes pulse-rec { 0%,100%{box-shadow:0 0 0 rgba(255,23,68,0);} 50%{box-shadow:0 0 12px rgba(255,23,68,0.4);} }

  .servos { display:grid; grid-template-columns:repeat(5,1fr); gap:4px; padding:8px; }
  .sc { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.04); border-radius:8px; padding:8px 4px; text-align:center; transition:all 0.25s; }
  .sc .emoji { font-size:1em; filter:grayscale(1) opacity(0.25); transition:filter 0.2s; }
  .sc.on .emoji { filter:grayscale(0) opacity(1); }
  .sc .nm { font-size:0.55em; color:#546e7a; text-transform:uppercase; letter-spacing:1px; }
  .sc .val { font-size:1.2em; font-weight:700; color:var(--green); margin:2px 0; }
  .sc .bar { height:2px; background:rgba(255,255,255,0.06); border-radius:1px; overflow:hidden; margin-top:2px; }
  .sc .bf { height:100%; background:var(--green); border-radius:1px; transition:width 0.2s ease-out; }

  .chart-wrap { padding:4px; height:100px; }
  .chart-wrap canvas { position:relative !important; }

  .log { max-height:60px; overflow-y:auto; padding:2px; }
  .log-l { padding:1px 6px; font-size:0.6em; font-family:monospace; color:#546e7a; border-bottom:1px solid rgba(255,255,255,0.02); }
  footer { text-align:center; padding:2px; font-size:0.55em; color:#1c2833; }
</style>
</head>
<body>
<div class="container">
<header><h1>BrazoRobótico</h1><div class="sub">Control por Visión · UNO Q</div></header>
<div class="status-bar"><div class="dot" id="dot"></div><span id="status">Desconectado</span><span class="latency" id="lag">·</span></div>

<div class="card">
  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canv"></canvas>
    <div class="finger-dots" id="fdots">
      <div class="fd" title="Pulgar"></div><div class="fd" title="Índice"></div>
      <div class="fd" title="Corazón"></div><div class="fd" title="Anular"></div><div class="fd" title="Meñique"></div>
    </div>
  </div>
  <div class="btn-row">
    <button class="b-on" id="bStart" onclick="start()">▶ Iniciar</button>
    <button class="b-off" id="bStop" onclick="stop()" disabled>⏹ Detener</button>
    <button class="b-rec" id="bRec" onclick="toggleRecord()" disabled>⏺ Grabar</button>
    <button class="b-rec" id="bReplay" onclick="toggleReplay()">▶ Reproducir</button>
  </div>
</div>

<div class="card">
  <div class="servos">
    <div class="sc" id="c0"><div class="emoji">👍</div><div class="nm">Pulgar</div><div class="val" id="v0">--°</div><div class="bar"><div class="bf" id="bf0" style="width:50%"></div></div></div>
    <div class="sc" id="c1"><div class="emoji">☝️</div><div class="nm">Índice</div><div class="val" id="v1">--°</div><div class="bar"><div class="bf" id="bf1" style="width:50%"></div></div></div>
    <div class="sc" id="c2"><div class="emoji">🖕</div><div class="nm">Corazón</div><div class="val" id="v2">--°</div><div class="bar"><div class="bf" id="bf2" style="width:50%"></div></div></div>
    <div class="sc" id="c3"><div class="emoji">💍</div><div class="nm">Anular</div><div class="val" id="v3">--°</div><div class="bar"><div class="bf" id="bf3" style="width:50%"></div></div></div>
    <div class="sc" id="c4"><div class="emoji">🤙</div><div class="nm">Meñique</div><div class="val" id="v4">--°</div><div class="bar"><div class="bf" id="bf4" style="width:50%"></div></div></div>
  </div>
</div>

<div class="card"><div class="chart-wrap"><canvas id="chart"></canvas></div></div>

<div class="card"><div class="three-wrap" id="threeBox"></div></div>

<div class="card log" id="log"><div class="log-l">Esperando conexión...</div></div>
<footer>ferxver · UNO Q · 2026</footer>
</div>

<script type="importmap">
{ "imports": { "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm" } }
</script>

<script type="module">
import { HandLandmarker, FilesetResolver } from "@mediapipe/tasks-vision";

const WS_URL = `wss://${location.hostname}:3000/ws`;
let ws = null, handLandmarker = null, tracking = false, animFrame = null, lastSend = 0, sendTime = 0;
let lastAngles = [90,90,90,90,90];
const video = document.getElementById("video");
const canv = document.getElementById("canv");
const ctx = canv.getContext("2d");
const EMA = 0.25;
let smoothed = null;

function smooth(raw) { if(!smoothed||smoothed.length!==raw.length){smoothed=raw.map(p=>({...p}));return smoothed;} for(let i=0;i<raw.length;i++){smoothed[i].x=smoothed[i].x*(1-EMA)+raw[i].x*EMA;smoothed[i].y=smoothed[i].y*(1-EMA)+raw[i].y*EMA;smoothed[i].z=smoothed[i].z*(1-EMA)+raw[i].z*EMA;} return smoothed; }
function setStatus(txt,on){document.getElementById("status").textContent=txt;document.getElementById("dot").className="dot"+(on?" on":"");}
function log(msg){const l=document.getElementById("log"),d=document.createElement("div");d.className="log-l";d.textContent=new Date().toTimeString().slice(0,8)+"  "+msg;l.insertBefore(d,l.firstChild);}
function updateServos(angles){for(let i=0;i<5;i++){const a=Math.round(angles[i]);document.getElementById("v"+i).textContent=a+"°";document.getElementById("bf"+i).style.width=(a/180*100)+"%";document.getElementById("c"+i).classList.toggle("on",i===0?a<145:a<50);document.querySelectorAll("#fdots .fd")[i].classList.toggle("up",i===0?a<145:a<50);}}

window.start = async function(){
  document.getElementById("bStart").disabled=true;
  try{video.srcObject=await navigator.mediaDevices.getUserMedia({video:{width:480,height:360,facingMode:"user"}});await video.play();canv.width=video.videoWidth;canv.height=video.videoHeight;}
  catch(e){log("ERROR: Cámara no disponible");document.getElementById("bStart").disabled=false;return;}
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{setStatus("Conectado",true);log("WebSocket conectado");};
  ws.onclose=()=>{setStatus("Desconectado",false);log("WebSocket cerrado");};
  ws.onmessage=(e)=>{const d=JSON.parse(e.data);if(d.angles){lastAngles=d.angles;updateServos(d.angles);pushChart(d.angles);}const lag=Math.round(performance.now()-sendTime);const el=document.getElementById("lag");el.textContent=lag+"ms";el.className="latency "+(lag<80?"good":lag<150?"warn":"bad");};
  const vision=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm");
  handLandmarker=await HandLandmarker.createFromOptions(vision,{baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",delegate:"GPU"},runningMode:"VIDEO",numHands:1});
  tracking=true;document.getElementById("bStop").disabled=false;document.getElementById("bRec").disabled=false;log("Tracking activo");loop();
};

window.stop = function(){tracking=false;document.getElementById("bStart").disabled=false;document.getElementById("bStop").disabled=true;document.getElementById("bRec").disabled=true;if(ws)ws.close();if(animFrame)cancelAnimationFrame(animFrame);if(video.srcObject)video.srcObject.getTracks().forEach(t=>t.stop());if(recording)toggleRecord();setStatus("Detenido",false);log("Tracking detenido");};

// Grabación
let recordedFrames=[],recording=false,replaying=false,replayIdx=0,wasTracking=false;
window.toggleRecord=function(){if(recording){recording=false;document.getElementById("bRec").textContent="⏺ Grabar";document.getElementById("bRec").classList.remove("recording");const b=new Blob([JSON.stringify(recordedFrames)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="robot-"+Date.now()+".json";a.click();log("Grabado: "+recordedFrames.length+" frames");recordedFrames=[];}else{recording=true;recordedFrames=[];document.getElementById("bRec").textContent="⏹ Parar";document.getElementById("bRec").classList.add("recording");log("Grabación iniciada");}};
window.toggleReplay=function(){if(replaying){replaying=false;if(wasTracking)tracking=true;log("Reproducción detenida");document.getElementById("bReplay").textContent="▶ Reproducir";return;}if(!recordedFrames.length){const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=e=>{const r=new FileReader();r.onload=ev=>{recordedFrames=JSON.parse(ev.target.result);startReplay();};r.readAsText(e.target.files[0]);};i.click();return;}startReplay();};
function startReplay(){replaying=true;replayIdx=0;wasTracking=tracking;tracking=false;if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}document.getElementById("bReplay").textContent="⏹ Parar rep.";log("Reproduciendo "+recordedFrames.length+" frames");replayLoop();}

function replayLoop(){
  if(!replaying||replayIdx>=recordedFrames.length){if(replaying)toggleReplay();return;}
  const f=recordedFrames[replayIdx++];
  if(f.angles)updateServos(f.angles);
  if(f.angles)pushChart(f.angles);
  update3D(f.landmarks);
  setTimeout(()=>requestAnimationFrame(replayLoop),36);
}

// Gráfica (carga asíncrona)
let chart=null,chartData=null;
(function loadChart(){
  function setup(){if(typeof Chart==="undefined")return;chartData={labels:[],datasets:[
    {label:"Pulgar",borderColor:"#ffab00",data:[],borderWidth:1.5,pointRadius:0,tension:0.2},
    {label:"Índice",borderColor:"#00e676",data:[],borderWidth:1.5,pointRadius:0,tension:0.2},
    {label:"Corazón",borderColor:"#448aff",data:[],borderWidth:1.5,pointRadius:0,tension:0.2},
    {label:"Anular",borderColor:"#e040fb",data:[],borderWidth:1.5,pointRadius:0,tension:0.2},
    {label:"Meñique",borderColor:"#69f0ae",data:[],borderWidth:1.5,pointRadius:0,tension:0.2},
  ]};chart=new Chart(document.getElementById("chart"),{type:"line",data:chartData,
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      scales:{y:{min:0,max:180,grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#546e7a",font:{size:9}}},x:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#546e7a",font:{size:8},maxTicksLimit:8}}},
      plugins:{legend:{labels:{color:"#546e7a",font:{size:9},usePointStyle:true,boxWidth:6}}}}});
    log("Gráfica activa");
  }
  if(typeof Chart!=="undefined"){setup();return;}
  const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js";s.onload=setup;document.head.appendChild(s);
})();
function pushChart(angles){if(!chart||!chartData)return;const t=new Date().toTimeString().slice(0,8);chartData.labels.push(t);for(let i=0;i<5;i++)chartData.datasets[i].data.push(Math.round(angles[i]));if(chartData.labels.length>60){chartData.labels.shift();chartData.datasets.forEach(d=>d.data.shift());}chart.update("none");}

// Mano 3D (carga asíncrona)
let _3d={ok:false,scene:null,cam:null,rnd:null,joints:[],bones:[],pairs:[]};
(function init3D(){
  function setup(){if(typeof THREE==="undefined")return;const b=document.getElementById("threeBox");if(!b)return;try{_3d.scene=new THREE.Scene();_3d.scene.background=new THREE.Color(0x060b14);_3d.cam=new THREE.PerspectiveCamera(45,1,0.1,10);_3d.cam.position.set(0,0.3,1.8);_3d.cam.lookAt(0,0.3,0);_3d.rnd=new THREE.WebGLRenderer({antialias:true});_3d.rnd.setPixelRatio(1);_3d.rnd.setSize(400,200);b.appendChild(_3d.rnd.domElement);const jm=new THREE.MeshBasicMaterial({color:0x00e676}),bm=new THREE.LineBasicMaterial({color:0x00e676,opacity:0.4,transparent:true});for(let i=0;i<21;i++){const s=new THREE.SphereGeometry(0.015,8,8);_3d.joints.push(new THREE.Mesh(s,jm));_3d.scene.add(_3d.joints[i]);}_3d.pairs=[[0,1],[0,5],[0,17],[1,2],[2,3],[3,4],[5,6],[6,7],[7,8],[9,10],[10,11],[11,12],[13,14],[14,15],[15,16],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];_3d.bones=_3d.pairs.map(()=>{const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(),new THREE.Vector3()]);return new THREE.Line(g,bm);});_3d.bones.forEach(l=>_3d.scene.add(l));_3d.ok=true;_3d.rnd.render(_3d.scene,_3d.cam);log("Mano 3D activa");}catch(e){}}
  if(typeof THREE!=="undefined"){setup();return;}
  const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";s.onload=setup;document.head.appendChild(s);
})();
function update3D(lm){if(!_3d.ok||!lm||lm.length<21)return;for(let i=0;i<21;i++)_3d.joints[i].position.set((lm[i].x-0.5)*0.6,(0.5-lm[i].y)*0.45+0.2,lm[i].z*0.3);_3d.pairs.forEach(([a,b],i)=>_3d.bones[i].geometry.setFromPoints([_3d.joints[a].position,_3d.joints[b].position]));_3d.rnd.render(_3d.scene,_3d.cam);}

const DRAW=[[0,1],[0,5],[0,17],[1,2],[2,3],[3,4],[5,6],[6,7],[7,8],[9,10],[10,11],[11,12],[13,14],[14,15],[15,16],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];

function loop(){if(!tracking||replaying)return;ctx.clearRect(0,0,canv.width,canv.height);
  if(handLandmarker&&video.readyState>=2){const res=handLandmarker.detectForVideo(video,performance.now());if(res.landmarks&&res.landmarks.length>0){
    const lm=res.landmarks[0];const raw=lm.map(p=>({x:p.x,y:p.y,z:p.z}));const landmarks=smooth(raw);
    ctx.strokeStyle="rgba(0,230,118,0.25)";ctx.lineWidth=1.5;DRAW.forEach(([a,b])=>{ctx.beginPath();ctx.moveTo(landmarks[a].x*canv.width,landmarks[a].y*canv.height);ctx.lineTo(landmarks[b].x*canv.width,landmarks[b].y*canv.height);ctx.stroke();});
    landmarks.forEach((p,i)=>{const x=p.x*canv.width,y=p.y*canv.height;ctx.beginPath();ctx.arc(x,y,[4,8,12,16,20].includes(i)?4.5:2.5,0,Math.PI*2);ctx.fillStyle=[4,8,12,16,20].includes(i)?"#00e676":"rgba(0,230,118,0.45)";ctx.fill();});
    const now=performance.now();if(now-lastSend>50&&ws&&ws.readyState===WebSocket.OPEN){sendTime=now;ws.send(JSON.stringify({landmarks,timestamp:now}));lastSend=now;}
    update3D(landmarks);if(recording)recordedFrames.push({landmarks:landmarks.map(p=>({x:p.x,y:p.y,z:p.z})),angles:[...lastAngles],timestamp:now});
  }}
  animFrame=requestAnimationFrame(loop);
}
</script>
</body>
</html>
